[pytest]
pythonpath = ..
testpaths = .
addopts = --basetemp=.pytest_tmp -m "not integration" -p no:cacheprovider -p no:tmpdir --ignore-glob=pytest-cache-files-* --ignore-glob=.pytest_tmp_local
norecursedirs = __pycache__ .pytest_cache .pytest_tmp .pytest_tmp_local artifacts pytest-cache-files-*
markers =
    integration: marks tests that call external integrations
