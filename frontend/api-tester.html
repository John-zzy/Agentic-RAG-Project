<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>知识助手 API 测试台</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #172033;
      --muted: #647084;
      --faint: #98a2b3;
      --line: #e6ebf2;
      --brand: #2563eb;
      --brand-deep: #1d4ed8;
      --mint: #10b981;
      --warm: #f59e0b;
      --danger: #dc2626;
      --shadow: 0 24px 70px rgba(26, 37, 63, 0.12);
      --shadow-soft: 0 12px 30px rgba(26, 37, 63, 0.08);
      --radius-sm: 16px;
      --body: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--body);
      color: var(--text);
      background:
        linear-gradient(120deg, rgba(37, 99, 235, 0.08), transparent 32%),
        linear-gradient(240deg, rgba(16, 185, 129, 0.1), transparent 28%),
        var(--bg);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    a:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.22);
      outline-offset: 2px;
    }

    .app {
      width: min(1280px, calc(100vw - 32px));
      min-height: calc(100vh - 32px);
      margin: 16px auto;
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      overflow: hidden;
      border: 1px solid rgba(230, 235, 242, 0.9);
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }

    .service-panel {
      padding: 34px;
      display: flex;
      flex-direction: column;
      gap: 26px;
      background:
        linear-gradient(180deg, rgba(37, 99, 235, 0.08), transparent 42%),
        #ffffff;
      border-right: 1px solid var(--line);
    }

    .brand-mark {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      color: #ffffff;
      font-size: 20px;
      font-weight: 900;
      background: linear-gradient(145deg, var(--brand), var(--mint));
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.24);
    }

    .hero h1 {
      margin: 18px 0 12px;
      font-size: 34px;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.72;
    }

    .service-status {
      display: flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      color: #047857;
      background: #ecfdf5;
      border: 1px solid #bbf7d0;
      font-size: 13px;
      font-weight: 700;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 0 6px rgba(16, 185, 129, 0.12);
    }

    .quick-area,
    .trust-list {
      display: grid;
      gap: 12px;
    }

    .section-label {
      margin: 0;
      color: var(--faint);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .quick-card,
    .nav-card {
      width: 100%;
      padding: 16px;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      color: var(--text);
      background: #ffffff;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .quick-card:hover,
    .nav-card:hover {
      transform: translateY(-2px);
      border-color: rgba(37, 99, 235, 0.32);
      box-shadow: var(--shadow-soft);
    }

    .quick-card strong,
    .nav-card strong,
    .trust-item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 15px;
    }

    .quick-card span,
    .nav-card span,
    .trust-item span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      margin-top: 12px;
      padding: 0 14px;
      border-radius: 999px;
      color: var(--brand);
      background: #eff6ff;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    .trust-list {
      margin-top: auto;
    }

    .trust-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 14px;
      border-radius: var(--radius-sm);
      background: var(--panel-soft);
    }

    .trust-icon {
      flex: 0 0 34px;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: var(--brand);
      background: #eff6ff;
      font-weight: 900;
    }

    .chat-panel {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      background: #fbfdff;
    }

    .chat-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 26px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
    }

    .agent-info {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .agent-avatar {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      color: #ffffff;
      font-weight: 900;
      background: var(--brand);
    }

    .agent-info h2 {
      margin: 0;
      font-size: 18px;
    }

    .agent-info p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .new-chat {
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      color: var(--brand);
      background: #eff6ff;
      font-weight: 800;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .scene-select {
      min-height: 42px;
      min-width: 210px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--text);
      background: #ffffff;
      font-size: 14px;
      font-weight: 700;
    }

    .chat-feed {
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 28px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 78%;
      animation: message-in 220ms ease both;
    }

    .message.user {
      margin-left: auto;
      flex-direction: row-reverse;
    }

    .message-avatar {
      flex: 0 0 34px;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: #ffffff;
      background: var(--brand);
      font-size: 12px;
      font-weight: 900;
    }

    .message.user .message-avatar {
      background: #111827;
    }

    .bubble {
      padding: 15px 17px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: #ffffff;
      box-shadow: 0 8px 20px rgba(26, 37, 63, 0.06);
    }

    .message.user .bubble {
      color: #ffffff;
      background: var(--brand);
      border-color: var(--brand);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.18);
    }

    .bubble p {
      margin: 0;
      font-size: 15px;
      line-height: 1.72;
      white-space: pre-wrap;
    }

    .sources {
      display: grid;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .source-chip {
      display: block;
      padding: 10px 12px;
      border-radius: 12px;
      color: var(--muted);
      background: var(--panel-soft);
      font-size: 12px;
      line-height: 1.5;
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
    }

    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: blink 900ms infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 120ms;
    }

    .typing span:nth-child(3) {
      animation-delay: 240ms;
    }

    .composer {
      padding: 18px 26px 24px;
      border-top: 1px solid var(--line);
      background: #ffffff;
    }

    .composer-box {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: end;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel-soft);
    }

    textarea {
      min-height: 54px;
      max-height: 160px;
      resize: vertical;
      padding: 14px;
      border: 0;
      outline: none;
      border-radius: 16px;
      color: var(--text);
      background: transparent;
      font-size: 15px;
      line-height: 1.55;
    }

    .send-button {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      color: #ffffff;
      background: var(--brand);
      font-size: 20px;
      font-weight: 900;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.22);
      transition: transform 160ms ease, background 160ms ease;
    }

    .send-button:hover {
      transform: translateY(-1px);
      background: var(--brand-deep);
    }

    .send-button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    .error-toast {
      display: none;
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      color: #b91c1c;
      background: #fef2f2;
      border: 1px solid #fecaca;
      font-size: 13px;
    }

    .error-toast.show {
      display: block;
    }

    @keyframes message-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes blink {
      0%,
      100% {
        opacity: 0.25;
        transform: translateY(0);
      }
      50% {
        opacity: 1;
        transform: translateY(-2px);
      }
    }

    @media (max-width: 960px) {
      .app {
        grid-template-columns: 1fr;
      }

      .service-panel {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .trust-list {
        margin-top: 0;
      }
    }

    @media (max-width: 640px) {
      body {
        background: #ffffff;
      }

      .app {
        width: 100vw;
        min-height: 100vh;
        margin: 0;
        border: 0;
        border-radius: 0;
      }

      .service-panel {
        padding: 22px;
      }

      .hero h1 {
        font-size: 28px;
      }

      .chat-topbar {
        padding: 16px;
      }

      .chat-feed {
        padding: 18px 16px;
      }

      .message {
        max-width: 92%;
      }

      .composer {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="service-panel">
      <section class="hero">
        <div class="brand-mark">AI</div>
        <h1>你好，我是你的通用知识助手</h1>
        <p>你可以围绕已上传文档提问，我会结合检索结果给出尽量清晰、可追溯的回答。</p>
      </section>

      <div class="service-status" id="serviceStatus">
        <span class="status-dot"></span>
        <span>正在连接知识助手服务</span>
      </div>

      <section class="nav-card" aria-label="页面导航">
        <strong>知识库管理已独立拆分</strong>
        <span>文件上传、文件列表、索引状态和手动重建已迁移到独立页面，当前页面仅保留对话测试。</span>
        <a class="nav-link" href="/frontend/knowledge-manager.html">打开知识库管理页</a>
      </section>

      <section class="quick-area" aria-label="常见问题">
        <p class="section-label">猜你想问</p>
        <button class="quick-card" type="button" data-message="总结一下这份文档里关于退换货规则的关键信息。">
          <strong>总结文档规则</strong>
          <span>适合快速验证文档型知识问答链路。</span>
        </button>
        <button class="quick-card" type="button" data-message="对比文档中提到的两个方案，它们的差异是什么？">
          <strong>对比两个方案</strong>
          <span>适合验证多片段检索和归纳回答。</span>
        </button>
        <button class="quick-card" type="button" data-message="如果文档证据不够，请告诉我还需要补充什么信息。">
          <strong>测试兜底回复</strong>
          <span>适合验证证据不足时的提示是否清晰。</span>
        </button>
      </section>

      <section class="trust-list" aria-label="服务能力">
        <div class="trust-item">
          <div class="trust-icon">1</div>
          <div>
            <strong>结合上传文档知识</strong>
            <span>回答会优先参考已注册文档及其检索片段。</span>
          </div>
        </div>
        <div class="trust-item">
          <div class="trust-icon">2</div>
          <div>
            <strong>支持连续追问</strong>
            <span>可以围绕同一主题连续追问、补充上下文。</span>
          </div>
        </div>
      </section>
    </aside>

    <section class="chat-panel">
      <header class="chat-topbar">
        <div class="agent-info">
          <div class="agent-avatar">知</div>
          <div>
            <h2>在线知识助手</h2>
            <p id="chatSubtitle">请描述你的问题，我会结合当前知识库尽量给出清晰回答。</p>
          </div>
        </div>
        <div class="topbar-actions">
          <select id="sceneSelect" class="scene-select" aria-label="选择场景"></select>
          <button id="newChat" class="new-chat" type="button">新对话</button>
        </div>
      </header>

      <div id="chatFeed" class="chat-feed" aria-live="polite"></div>

      <footer class="composer">
        <div class="composer-box">
          <textarea id="messageInput" placeholder="输入你的问题，例如：请总结员工手册里关于请假的规则"></textarea>
          <button id="sendButton" class="send-button" type="button" aria-label="发送">→</button>
        </div>
        <div id="errorToast" class="error-toast"></div>
      </footer>
    </section>
  </main>

  <script>
    const API_BASE_URL = "http://127.0.0.1:8000";

    const state = {
      sessionId: "",
      messages: [],
      sending: false,
      scenes: [],
      activeScene: "",
      sceneLoading: false
    };

    const refs = {
      serviceStatus: document.getElementById("serviceStatus"),
      chatSubtitle: document.getElementById("chatSubtitle"),
      chatFeed: document.getElementById("chatFeed"),
      sceneSelect: document.getElementById("sceneSelect"),
      input: document.getElementById("messageInput"),
      sendButton: document.getElementById("sendButton"),
      newChat: document.getElementById("newChat"),
      errorToast: document.getElementById("errorToast")
    };

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function showError(message) {
      refs.errorToast.textContent = message;
      refs.errorToast.classList.add("show");
    }

    function clearError() {
      refs.errorToast.textContent = "";
      refs.errorToast.classList.remove("show");
    }

    function getSceneMeta(scene) {
      return state.scenes.find(function (item) {
        return item.scene === scene;
      }) || null;
    }

    function updateSubtitle(message) {
      if (message) {
        refs.chatSubtitle.textContent = message;
        return;
      }

      const activeScene = getSceneMeta(state.activeScene);
      if (activeScene) {
        refs.chatSubtitle.textContent = "当前场景：" + activeScene.name + "。切换场景会自动开始新对话。";
        return;
      }

      refs.chatSubtitle.textContent = "请描述你的问题，我会结合当前知识库尽量给出清晰回答。";
    }

    function setServiceStatus(ok) {
      refs.serviceStatus.innerHTML = ok
        ? '<span class="status-dot"></span><span>知识助手服务已连接</span>'
        : '<span class="status-dot"></span><span>知识助手服务暂不可用</span>';
      refs.serviceStatus.style.color = ok ? "#047857" : "#b91c1c";
      refs.serviceStatus.style.background = ok ? "#ecfdf5" : "#fef2f2";
      refs.serviceStatus.style.borderColor = ok ? "#bbf7d0" : "#fecaca";
    }

    function setInteractiveState() {
      const disabled = state.sending || state.sceneLoading || !state.activeScene || !state.sessionId;
      refs.sendButton.disabled = disabled;
      refs.input.disabled = state.sceneLoading || !state.activeScene;
      refs.sceneSelect.disabled = state.sceneLoading || !state.scenes.length;
      refs.newChat.disabled = state.sceneLoading || !state.activeScene;
    }

    function scrollToBottom() {
      refs.chatFeed.scrollTop = refs.chatFeed.scrollHeight;
    }

    function addMessage(role, text, citations) {
      state.messages.push({
        role,
        text,
        citations: Array.isArray(citations) ? citations.slice(0, 2) : []
      });
      renderMessages();
    }

    function renderMessages() {
      if (!state.messages.length) {
        refs.chatFeed.innerHTML =
          '<article class="message assistant">' +
            '<div class="message-avatar">知</div>' +
            '<div class="bubble">' +
              '<p>欢迎咨询。你可以直接提问文档内容、让系统做总结，或者继续追问某个细节。</p>' +
            '</div>' +
          '</article>';
        return;
      }

      refs.chatFeed.innerHTML = state.messages.map(function (message) {
        const isUser = message.role === "user";
        const sources = message.citations.length
          ? '<div class="sources">' + message.citations.map(function (citation) {
              return '<span class="source-chip">' + escapeHtml(citation.snippet || citation.citation_id || "参考了知识库片段") + '</span>';
            }).join("") + '</div>'
          : "";

        return (
          '<article class="message ' + (isUser ? "user" : "assistant") + '">' +
            '<div class="message-avatar">' + (isUser ? "我" : "知") + '</div>' +
            '<div class="bubble">' +
              '<p>' + escapeHtml(message.text) + '</p>' +
              sources +
            '</div>' +
          '</article>'
        );
      }).join("");
      scrollToBottom();
    }

    function renderSceneOptions() {
      refs.sceneSelect.innerHTML = state.scenes.map(function (scene) {
        return '<option value="' + escapeHtml(scene.scene) + '">' + escapeHtml(scene.name) + '</option>';
      }).join("");
      refs.sceneSelect.value = state.activeScene;
      setInteractiveState();
    }

    function renderTyping() {
      refs.chatFeed.insertAdjacentHTML(
        "beforeend",
        '<article id="typingMessage" class="message assistant">' +
          '<div class="message-avatar">知</div>' +
          '<div class="bubble">' +
            '<div class="typing"><span></span><span></span><span></span></div>' +
          '</div>' +
        '</article>'
      );
      scrollToBottom();
    }

    function removeTyping() {
      const typing = document.getElementById("typingMessage");
      if (typing) {
        typing.remove();
      }
    }

    async function apiRequest(path, options) {
      const response = await fetch(API_BASE_URL + path, Object.assign({
        headers: { "Content-Type": "application/json" }
      }, options || {}));
      const text = await response.text();
      let data = null;
      try {
        data = text ? JSON.parse(text) : null;
      } catch (_) {
        data = text;
      }
      if (!response.ok) {
        throw new Error(data && data.detail ? JSON.stringify(data.detail) : "服务请求失败");
      }
      return data;
    }

    async function checkHealth() {
      try {
        await apiRequest("/health");
        setServiceStatus(true);
      } catch (_) {
        setServiceStatus(false);
      }
    }

    async function loadScenes() {
      state.sceneLoading = true;
      setInteractiveState();
      updateSubtitle("正在加载可用场景...");

      const data = await apiRequest("/scenes");
      state.scenes = Array.isArray(data.scenes) ? data.scenes : [];
      state.activeScene = data.default_scene || (state.scenes[0] && state.scenes[0].scene) || "";
      renderSceneOptions();
    }

    async function createSessionForScene(scene, options) {
      const keepMessages = options && options.keepMessages;
      state.sceneLoading = true;
      clearError();
      if (!keepMessages) {
        state.messages = [];
        renderMessages();
      }
      setInteractiveState();
      updateSubtitle("正在切换场景并创建新会话...");

      try {
        const data = await apiRequest("/sessions", {
          method: "POST",
          body: JSON.stringify({ scene: scene })
        });
        state.sessionId = data.session_id || "";
        state.activeScene = data.scene || scene;
        refs.sceneSelect.value = state.activeScene;
        updateSubtitle();
        setServiceStatus(true);
      } catch (_) {
        state.sessionId = "";
        updateSubtitle("场景切换失败，请稍后重试。");
        setServiceStatus(false);
        showError("场景切换失败，请稍后重试。");
      } finally {
        state.sceneLoading = false;
        setInteractiveState();
      }
    }

    async function sendMessage() {
      const text = refs.input.value.trim();
      if (!text || state.sending) {
        return;
      }

      clearError();
      refs.input.value = "";
      addMessage("user", text);
      renderTyping();
      state.sending = true;
      setInteractiveState();
      updateSubtitle("正在为你查询合适的回答...");

      try {
        const payload = {
          message: text,
          session_id: state.sessionId || null,
          stream: false,
          top_k: 4
        };
        const data = await apiRequest("/chat", {
          method: "POST",
          body: JSON.stringify(payload)
        });
        state.sessionId = data.session_id || state.sessionId;
        removeTyping();
        addMessage("assistant", data.answer || "我暂时没有找到合适的回答。", data.citations);
        updateSubtitle(state.sessionId ? "我会在当前场景里继续记住这次对话上下文。" : "");
        setServiceStatus(true);
      } catch (error) {
        removeTyping();
        showError("客服服务暂时没有响应，请稍后再试。");
        addMessage("assistant", "抱歉，我这边暂时连接不上服务。你可以稍后再发送一次。");
        updateSubtitle("服务连接失败，请稍后重试。");
        setServiceStatus(false);
      } finally {
        state.sending = false;
        setInteractiveState();
        refs.input.focus();
      }
    }

    async function newConversation() {
      await createSessionForScene(state.activeScene);
      refs.input.focus();
    }

    async function handleSceneChange() {
      const nextScene = refs.sceneSelect.value;
      if (!nextScene || nextScene === state.activeScene) {
        return;
      }
      await createSessionForScene(nextScene);
      refs.input.focus();
    }

    function initQuickCards() {
      document.querySelectorAll(".quick-card").forEach(function (button) {
        button.addEventListener("click", function () {
          refs.input.value = button.dataset.message || "";
          refs.input.focus();
        });
      });
    }

    async function init() {
      renderMessages();
      initQuickCards();
      setInteractiveState();
      checkHealth();
      await loadScenes();
      await createSessionForScene(state.activeScene, { keepMessages: true });
      refs.sendButton.addEventListener("click", sendMessage);
      refs.newChat.addEventListener("click", function () {
        newConversation();
      });
      refs.sceneSelect.addEventListener("change", function () {
        handleSceneChange();
      });
      refs.input.addEventListener("keydown", function (event) {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });
    }

    init();
  </script>
</body>
</html>
