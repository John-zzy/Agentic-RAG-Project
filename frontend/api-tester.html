<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能客服工作台</title>
  <style>
    :root {
      --shell: rgba(255, 255, 255, 0.82);
      --surface: rgba(255, 255, 255, 0.92);
      --surface-soft: #f4f8fb;
      --text: #072840;
      --text-muted: #5c7488;
      --text-faint: #89a1b4;
      --line: #d7e3eb;
      --sidebar: #112b37;
      --teal: #0f6d74;
      --teal-soft: #dff2f0;
      --green: #1d8d67;
      --green-soft: #def5ea;
      --amber: #b8771f;
      --amber-soft: #fbeed9;
      --red: #d35a48;
      --red-soft: #fde8e5;
      --shadow-shell: 0 28px 70px rgba(9, 34, 52, 0.08);
      --shadow-card: 0 16px 36px rgba(12, 39, 58, 0.08);
      --shadow-soft: 0 10px 24px rgba(12, 39, 58, 0.06);
      --radius-shell: 28px;
      --radius-xl: 24px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --body: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--body);
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(15, 109, 116, 0.08), transparent 22%),
        linear-gradient(180deg, #f3f7fa 0%, #edf2f5 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.32) 0, rgba(255, 255, 255, 0.32) 1px, transparent 1px, transparent 120px),
        linear-gradient(rgba(255, 255, 255, 0.16) 0, rgba(255, 255, 255, 0.16) 1px, transparent 1px, transparent 120px);
      opacity: 0.36;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible,
    a:focus-visible {
      outline: 3px solid rgba(15, 109, 116, 0.18);
      outline-offset: 2px;
    }

    .shell {
      width: min(1680px, calc(100vw - 32px));
      height: calc(100vh - 32px);
      margin: 16px auto;
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      overflow: hidden;
      border: 1px solid rgba(155, 181, 198, 0.35);
      border-radius: var(--radius-shell);
      background: var(--shell);
      box-shadow: var(--shadow-shell);
      backdrop-filter: blur(14px);
    }

    .sidebar {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 24px 20px;
      background: linear-gradient(180deg, #102c37 0%, #143441 100%);
      color: #eef6fa;
      min-height: 0;
      overflow: hidden;
    }

    .sidebar::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 160px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0), rgba(14, 47, 61, 0.45));
      pointer-events: none;
    }

    .brand,
    .service-status,
    .nav {
      position: relative;
      z-index: 1;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: #e8f3f7;
      color: var(--teal);
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 800;
    }

    .brand-title {
      margin: 0 0 3px;
      color: #ffffff;
      font-size: 17px;
      font-weight: 800;
    }

    .brand-subtitle {
      margin: 0;
      color: rgba(224, 239, 247, 0.76);
      font-size: 12px;
    }

    .service-status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 34px;
      width: 100%;
      padding: 0 14px;
      border-radius: 999px;
      color: #dffaf0;
      background: rgba(34, 123, 104, 0.18);
      font-size: 13px;
      font-weight: 700;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #57d39f;
      box-shadow: 0 0 0 6px rgba(87, 211, 159, 0.12);
      flex: 0 0 10px;
    }

    .nav {
      display: grid;
      gap: 10px;
    }

    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 14px;
      color: #cfe0ea;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.04);
    }

    .nav-item.active {
      color: #072840;
      background: #eff8fc;
    }

    .nav-item.active::after {
      content: "";
      position: absolute;
      right: 14px;
      width: 4px;
      height: 12px;
      border-radius: 999px;
      background: var(--teal);
    }

    .workspace {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      background: linear-gradient(180deg, rgba(248, 251, 253, 0.94), rgba(240, 245, 249, 0.98));
      overflow: hidden;
    }

    .topbar {
      display: grid;
      gap: 16px;
      padding: 20px 28px 16px;
      background: rgba(255, 255, 255, 0.68);
      border-bottom: 1px solid rgba(216, 227, 235, 0.9);
    }

    .topbar-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
    }

    .page-title {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .topbar-pill,
    .scene-select,
    .workspace-button {
      min-height: 40px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
      color: var(--text);
      box-shadow: var(--shadow-soft);
    }

    .topbar-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 700;
    }

    .topbar-pill strong {
      color: var(--text);
    }

    .scene-select {
      min-width: 190px;
      font-weight: 700;
    }

    .workspace-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    .workspace-button.primary {
      background: linear-gradient(135deg, var(--teal), #1f878c);
      color: #ffffff;
      border: 0;
    }

    .conversation-board {
      min-height: 0;
      padding: 18px 28px 22px;
      overflow: hidden;
      display: flex;
    }

    .board-panel {
      min-height: 0;
      flex: 1 1 auto;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      border: 1px solid rgba(212, 223, 231, 0.92);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .board-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 22px;
      background: linear-gradient(180deg, rgba(250, 253, 254, 0.96), rgba(244, 248, 250, 0.94));
      border-bottom: 1px solid rgba(215, 226, 233, 0.92);
    }

    .board-head h2 {
      margin: 0;
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
    }

    .board-head-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .mount-dropdown {
      position: relative;
    }

    .mount-trigger {
      min-height: 42px;
      min-width: 244px;
      padding: 0 16px;
      border-radius: 16px;
      border: 1px solid rgba(205, 219, 227, 0.94);
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: var(--shadow-soft);
    }

    .mount-trigger-copy {
      display: grid;
      gap: 2px;
      text-align: left;
    }

    .mount-trigger-copy strong {
      font-size: 13px;
      font-weight: 800;
    }

    .mount-trigger-copy span {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .mount-trigger-caret {
      color: var(--teal);
      font-size: 12px;
      font-weight: 800;
      transition: transform 160ms ease;
    }

    .mount-dropdown.open .mount-trigger-caret {
      transform: rotate(180deg);
    }

    .mount-menu {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      z-index: 8;
      width: min(360px, calc(100vw - 84px));
      display: none;
      gap: 10px;
      padding: 14px;
      border: 1px solid rgba(205, 219, 227, 0.94);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 22px 46px rgba(12, 39, 58, 0.14);
      backdrop-filter: blur(14px);
    }

    .mount-dropdown.open .mount-menu {
      display: grid;
    }

    .mount-menu-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .mount-menu-head strong {
      display: block;
      font-size: 14px;
      font-weight: 800;
    }

    .mount-menu-head span {
      display: block;
      margin-top: 4px;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .mount-menu-tip {
      padding: 5px 10px;
      border-radius: 999px;
      color: var(--teal);
      background: var(--teal-soft);
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .mount-options {
      display: grid;
      gap: 10px;
    }

    .mount-option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid rgba(214, 225, 232, 0.92);
      border-radius: 16px;
      background: rgba(244, 248, 251, 0.94);
      transition: border-color 160ms ease, transform 160ms ease, box-shadow 160ms ease;
    }

    .mount-option:hover {
      transform: translateY(-1px);
      border-color: rgba(127, 177, 189, 0.92);
      box-shadow: 0 12px 22px rgba(12, 39, 58, 0.06);
    }

    .mount-option input {
      margin-top: 2px;
      accent-color: var(--teal);
    }

    .mount-option strong {
      display: block;
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
    }

    .mount-option span {
      display: block;
      margin-top: 4px;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .feed-shell {
      min-height: 0;
      display: flex;
      padding: 18px 22px 20px;
      overflow: hidden;
    }

    .chat-feed {
      min-height: 0;
      flex: 1 1 auto;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 6px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .message-wrap {
      display: grid;
      gap: 10px;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 92%;
      animation: fade-up 180ms ease both;
    }

    .message.user {
      margin-left: auto;
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 40px;
      height: 40px;
      flex: 0 0 40px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      color: #ffffff;
      background: linear-gradient(135deg, #18384a, #295065);
      font-size: 12px;
      font-weight: 800;
    }

    .message.user .message-avatar {
      background: linear-gradient(135deg, var(--teal), #27949a);
    }

    .bubble {
      min-width: 0;
      padding: 16px 18px;
      border-radius: 22px;
      border: 1px solid rgba(214, 225, 232, 0.92);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow-soft);
    }

    .message.user .bubble {
      background: linear-gradient(135deg, #e2f4f6, #d3eef0);
      border-color: rgba(177, 220, 223, 0.92);
    }

    .message-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .meta-chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 10px;
      border-radius: 999px;
      color: var(--text-muted);
      background: rgba(20, 32, 51, 0.06);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .meta-chip.ok {
      color: var(--green);
      background: var(--green-soft);
    }

    .meta-chip.warn {
      color: var(--amber);
      background: var(--amber-soft);
    }

    .bubble p {
      margin: 0;
      color: #13374f;
      font-size: 15px;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble-actions {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .knowledge-toggle {
      width: 100%;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(177, 220, 223, 0.92);
      background: rgba(223, 242, 240, 0.72);
      color: var(--teal);
      text-align: left;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
    }

    .knowledge-toggle strong {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
      font-weight: 800;
    }

    .knowledge-toggle span {
      display: block;
      color: #456778;
      font-size: 12px;
      line-height: 1.55;
    }

    .knowledge-toggle.is-open {
      background: rgba(15, 109, 116, 0.12);
    }

    .support-card-inline {
      width: min(760px, calc(100% - 52px));
      margin-left: 52px;
      border-radius: 22px;
      border: 1px solid rgba(201, 215, 224, 0.94);
      background: linear-gradient(180deg, rgba(250, 253, 254, 0.98), rgba(243, 248, 251, 0.98));
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .support-head-inline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 16px 0;
      flex-wrap: wrap;
    }

    .support-head-inline h4 {
      margin: 0;
      color: var(--text);
      font-size: 16px;
      font-weight: 800;
    }

    .support-head-inline span {
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
    }

    .support-body-inline {
      padding: 12px 16px 16px;
      display: grid;
      gap: 12px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .detail-item {
      padding: 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(214, 225, 232, 0.92);
    }

    .detail-item.full {
      grid-column: 1 / -1;
    }

    .detail-item strong {
      display: block;
      margin-bottom: 5px;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .detail-item span {
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.5;
    }

    .support-head-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .support-link {
      min-height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(177, 220, 223, 0.92);
      background: rgba(223, 242, 240, 0.72);
      color: var(--teal);
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      font-weight: 800;
      text-decoration: none;
    }

    .evidence-summary {
      display: grid;
      gap: 10px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(214, 225, 232, 0.92);
    }

    .evidence-summary-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .evidence-summary strong {
      display: block;
      margin-bottom: 4px;
      color: var(--text);
      font-size: 14px;
    }

    .evidence-summary span {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .evidence-score {
      min-width: 76px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(15, 109, 116, 0.08);
      color: var(--teal);
      text-align: center;
    }

    .evidence-score strong {
      margin: 0;
      font-size: 11px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .evidence-score span {
      display: block;
      margin-top: 6px;
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
    }

    .evidence-counts {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .evidence-pill {
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(20, 32, 51, 0.06);
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .citation-list {
      display: grid;
      gap: 10px;
    }

    .citation-card {
      display: grid;
      gap: 8px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(214, 225, 232, 0.92);
    }

    .citation-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .citation-index {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 34px;
      padding: 0 10px;
      border-radius: 999px;
      color: #ffffff;
      background: linear-gradient(135deg, var(--teal), #1f878c);
      font-size: 13px;
      font-weight: 800;
    }

    .citation-title {
      flex: 1 1 auto;
      min-width: 0;
    }

    .citation-title strong {
      display: block;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      word-break: break-word;
    }

    .citation-title span {
      display: block;
      margin-top: 4px;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.5;
      word-break: break-word;
    }

    .citation-meta-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .citation-meta {
      padding: 9px 10px;
      border-radius: 12px;
      background: rgba(244, 248, 251, 0.94);
      border: 1px solid rgba(214, 225, 232, 0.92);
    }

    .citation-meta strong {
      display: block;
      margin-bottom: 4px;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .citation-meta span {
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
      word-break: break-word;
    }

    .citation-snippet {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(223, 242, 240, 0.46);
      border: 1px solid rgba(177, 220, 223, 0.92);
    }

    .citation-snippet strong {
      display: block;
      margin-bottom: 6px;
      color: var(--teal);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .citation-snippet span {
      color: #13374f;
      font-size: 13px;
      line-height: 1.7;
      word-break: break-word;
    }

    .card-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .action-chip {
      min-height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(205, 219, 227, 0.92);
      background: #edf5f8;
      color: var(--teal);
      display: inline-flex;
      align-items: center;
      font-size: 13px;
      font-weight: 700;
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--text-muted);
    }

    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: blink 900ms infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 120ms;
    }

    .typing span:nth-child(3) {
      animation-delay: 240ms;
    }

    .composer {
      padding: 0 28px 24px;
    }

    .composer-shell {
      display: grid;
      gap: 14px;
      padding: 16px 18px;
      border-radius: 24px;
      border: 1px solid rgba(203, 217, 225, 0.94);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow-card);
    }

    .composer-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .composer-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: end;
    }

    textarea {
      height: 96px;
      resize: none;
      padding: 16px 18px;
      border: 1px solid rgba(205, 219, 227, 0.94);
      border-radius: 20px;
      color: var(--text);
      background: #fbfdfe;
      font-size: 15px;
      line-height: 1.68;
    }

    .send-button {
      min-width: 122px;
      height: 56px;
      padding: 0 22px;
      border-radius: 18px;
      color: #ffffff;
      background: linear-gradient(135deg, var(--teal), #1f878c);
      box-shadow: 0 16px 30px rgba(15, 109, 116, 0.22);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .send-button:disabled {
      cursor: not-allowed;
      opacity: 0.52;
      box-shadow: none;
    }

    .error-toast {
      display: none;
      padding: 14px 16px;
      border-radius: 16px;
      color: var(--red);
      background: var(--red-soft);
      border: 1px solid rgba(211, 90, 72, 0.18);
      font-size: 13px;
      line-height: 1.6;
    }

    .error-toast.show {
      display: block;
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes blink {
      0%,
      100% {
        opacity: 0.24;
        transform: translateY(0);
      }
      50% {
        opacity: 1;
        transform: translateY(-2px);
      }
    }

    @media (max-width: 1320px) {
      .shell {
        grid-template-columns: 220px minmax(0, 1fr);
      }

    }

    @media (max-width: 1120px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

    }

    @media (max-width: 840px) {
      .shell {
        width: 100vw;
        height: 100vh;
        margin: 0;
        border: 0;
        border-radius: 0;
      }

      .topbar,
      .conversation-board,
      .composer {
        padding-left: 18px;
        padding-right: 18px;
      }

      .composer-topline {
        flex-direction: column;
        align-items: stretch;
      }

      .topbar-row,
      .topbar-actions,
      .composer-grid {
        width: 100%;
      }

      .topbar-actions {
        justify-content: flex-start;
      }

      .board-head {
        align-items: stretch;
      }

      .board-head-actions {
        width: 100%;
        justify-content: stretch;
      }

      .mount-trigger {
        width: 100%;
      }

      .mount-menu {
        left: 0;
        right: auto;
        width: 100%;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }

      .citation-meta-grid {
        grid-template-columns: 1fr;
      }

      .support-card-inline {
        width: 100%;
        margin-left: 0;
      }

      .message {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">AI</div>
        <div>
          <p class="brand-title">Customer Copilot</p>
          <p class="brand-subtitle">ToC Service Desk</p>
        </div>
      </div>

      <div id="serviceStatus" class="service-status">
        <span class="status-dot"></span>
        <span>知识服务连接检查中</span>
      </div>

      <nav class="nav" aria-label="工作台导航">
        <a class="nav-item active" href="javascript:void(0)">对话工作台</a>
        <a class="nav-item" href="javascript:void(0)">会话记录</a>
        <a class="nav-item" href="./knowledge-manager.html">知识库管理</a>
        <a class="nav-item" href="javascript:void(0)">客服策略</a>
      </nav>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div class="topbar-row">
          <div>
            <h1 class="page-title">连续对话工作台</h1>
          </div>

          <div class="topbar-actions">
            <div class="topbar-pill">当前会话：<strong id="sessionIdBadge">未建立</strong></div>
            <select id="sceneSelect" class="scene-select" aria-label="场景切换"></select>
            <button id="newChat" class="workspace-button" type="button">新会话</button>
            <a class="workspace-button primary" href="./knowledge-manager.html">前往知识库管理</a>
          </div>
        </div>
      </header>

      <section class="conversation-board">
        <div class="board-panel">
          <div class="board-head">
            <h2 id="sceneHeadline">对话主线程</h2>
            <div class="board-head-actions">
              <div id="mountDropdown" class="mount-dropdown">
                <button id="mountTrigger" class="mount-trigger" type="button" aria-haspopup="true" aria-expanded="false">
                  <span class="mount-trigger-copy">
                    <strong>知识源挂载</strong>
                    <span id="mountTriggerLabel">documents</span>
                  </span>
                  <span class="mount-trigger-caret">▼</span>
                </button>
                <div id="mountMenu" class="mount-menu" aria-label="知识源挂载设置" hidden>
                  <div class="mount-menu-head">
                    <div>
                      <strong>选择会话知识源</strong>
                      <span>新建会话时按当前勾选挂载，至少保留一个知识源。</span>
                    </div>
                    <span class="mount-menu-tip">会话级</span>
                  </div>
                  <div class="mount-options">
                    <label class="mount-option">
                      <input id="mountDocuments" type="checkbox" checked />
                      <span>
                        <strong>documents</strong>
                        文档知识库，默认启用。
                      </span>
                    </label>
                    <label class="mount-option">
                      <input id="mountEcommerce" type="checkbox" />
                      <span>
                        <strong>ecommerce</strong>
                        电商知识，可查询商品、评论、订单和库存。
                      </span>
                    </label>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="feed-shell">
            <div id="chatFeed" class="chat-feed"></div>
          </div>
        </div>
      </section>

      <footer class="composer">
        <div class="composer-shell">
          <div class="composer-topline">
            <span>支持连续追问，按 `Enter` 发送，`Shift + Enter` 换行</span>
            <span id="composerStatus">准备就绪</span>
          </div>

          <div class="composer-grid">
            <textarea id="messageInput" placeholder="输入用户问题，例如查询订单、解释退款规则或做商品对比..."></textarea>
            <button id="sendButton" class="send-button" type="button">发送</button>
          </div>

          <div id="errorToast" class="error-toast"></div>
        </div>
      </footer>
    </section>
  </main>

  <script>
    const API_BASE_URL = "http://127.0.0.1:8000";

    const sceneConfigs = {
      ecommerce: {
        headline: "对话主线程",
        welcome: "欢迎进入电商客服工作台。你可以围绕订单状态、物流进度、退款规则、商品对比等问题发起连续对话，我会尽量把证据和动作卡片就近插入到消息流中。"
      },
      generic_assistant: {
        headline: "通用知识问答线程",
        welcome: "欢迎进入通用知识场景。请围绕已建立索引的文档提问，我会优先展示知识证据片段，并在证据不足时明确提示。"
      }
    };

    const state = {
      sessionId: "",
      messages: [],
      expandedKnowledge: {},
      sending: false,
      scenes: [],
      activeScene: "",
      sceneLoading: false,
      mountedKnowledgeSources: ["documents"]
    };

    const refs = {
      serviceStatus: document.getElementById("serviceStatus"),
      sceneHeadline: document.getElementById("sceneHeadline"),
      sessionIdBadge: document.getElementById("sessionIdBadge"),
      chatFeed: document.getElementById("chatFeed"),
      sceneSelect: document.getElementById("sceneSelect"),
      mountDropdown: document.getElementById("mountDropdown"),
      mountTrigger: document.getElementById("mountTrigger"),
      mountMenu: document.getElementById("mountMenu"),
      mountTriggerLabel: document.getElementById("mountTriggerLabel"),
      documentsMount: document.getElementById("mountDocuments"),
      ecommerceMount: document.getElementById("mountEcommerce"),
      input: document.getElementById("messageInput"),
      sendButton: document.getElementById("sendButton"),
      newChat: document.getElementById("newChat"),
      composerStatus: document.getElementById("composerStatus"),
      errorToast: document.getElementById("errorToast")
    };

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getSceneConfig(scene) {
      return sceneConfigs[scene] || sceneConfigs.generic_assistant;
    }

    function pickPreferredScene(defaultScene, scenes) {
      return defaultScene || (scenes[0] && scenes[0].scene) || "";
    }

    function formatMountedSourceLabel(sources) {
      const normalized = Array.isArray(sources) && sources.length ? sources : ["documents"];
      if (normalized.length === 1) {
        return normalized[0];
      }
      return normalized.join(" + ");
    }

    function setMountMenuOpen(open) {
      refs.mountDropdown.classList.toggle("open", open);
      refs.mountTrigger.setAttribute("aria-expanded", open ? "true" : "false");
      if (open) {
        refs.mountMenu.removeAttribute("hidden");
      } else {
        refs.mountMenu.setAttribute("hidden", "");
      }
    }

    function updateMountTriggerLabel() {
      refs.mountTriggerLabel.textContent = formatMountedSourceLabel(getSelectedMountedKnowledgeSources());
    }

    // 读取当前勾选的知识源，用于创建新会话。
    function getSelectedMountedKnowledgeSources() {
      const selected = [];
      if (refs.documentsMount.checked) {
        selected.push("documents");
      }
      if (refs.ecommerceMount.checked) {
        selected.push("ecommerce");
      }
      if (!selected.length) {
        selected.push("documents");
      }
      return selected;
    }

    // 把后端返回的知识源状态同步回页面，避免前后端显示不一致。
    function syncMountedKnowledgeSources(sources) {
      const normalized = Array.isArray(sources) && sources.length ? sources : ["documents"];
      state.mountedKnowledgeSources = normalized.slice();
      refs.documentsMount.checked = normalized.indexOf("documents") >= 0;
      refs.ecommerceMount.checked = normalized.indexOf("ecommerce") >= 0;
      updateMountTriggerLabel();
    }

    function setComposerStatus(message) {
      refs.composerStatus.textContent = message;
    }

    function showError(message) {
      refs.errorToast.textContent = message;
      refs.errorToast.classList.add("show");
    }

    function clearError() {
      refs.errorToast.textContent = "";
      refs.errorToast.classList.remove("show");
    }

    function renderSceneConfig() {
      const config = getSceneConfig(state.activeScene);
      refs.sceneHeadline.textContent = config.headline;
    }

    function setServiceStatus(ok) {
      refs.serviceStatus.innerHTML = ok
        ? '<span class="status-dot"></span><span>智能客服服务在线</span>'
        : '<span class="status-dot"></span><span>服务连接异常</span>';
      refs.serviceStatus.style.color = ok ? "#dffaf0" : "#ffe3df";
      refs.serviceStatus.style.background = ok ? "rgba(34, 123, 104, 0.18)" : "rgba(211, 90, 72, 0.18)";
      document.querySelector(".status-dot").style.background = ok ? "#57d39f" : "#f27f70";
      document.querySelector(".status-dot").style.boxShadow = ok
        ? "0 0 0 6px rgba(87, 211, 159, 0.12)"
        : "0 0 0 6px rgba(242, 127, 112, 0.12)";
    }

    function setInteractiveState() {
      const disabled = state.sending || state.sceneLoading || !state.activeScene || !state.sessionId;
      refs.sendButton.disabled = disabled;
      refs.input.disabled = state.sceneLoading || !state.activeScene;
      refs.sceneSelect.disabled = state.sceneLoading || !state.scenes.length;
      refs.newChat.disabled = state.sceneLoading || !state.activeScene;
      refs.documentsMount.disabled = state.sceneLoading;
      refs.ecommerceMount.disabled = state.sceneLoading;
      refs.mountTrigger.disabled = state.sceneLoading;
    }

    function updateSessionBadge() {
      refs.sessionIdBadge.textContent = state.sessionId || "未建立";
    }

    function scrollToBottom() {
      refs.chatFeed.scrollTop = refs.chatFeed.scrollHeight;
    }

    function addMessage(role, text, options) {
      const meta = options || {};
      const messageId = "m" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
      state.messages.push({
        id: messageId,
        role: role,
        text: text,
        citations: Array.isArray(meta.citations) ? meta.citations.slice(0, 4) : [],
        knowledgeUsed: meta.knowledgeUsed,
        scene: meta.scene || state.activeScene,
        sourcePrompt: meta.sourcePrompt || ""
      });
      renderMessages();
    }

    function toggleKnowledgeDetails(messageId) {
      state.expandedKnowledge[messageId] = !state.expandedKnowledge[messageId];
      renderMessages();
    }

    function inferOrderId(text) {
      const match = String(text || "").match(/\bO\d{3,}\b/i);
      return match ? match[0].toUpperCase() : "";
    }

    function shouldShowOrderCard(message) {
      return /订单号|物流|物流单号|派送|签收|\bO\d{3,}\b/i.test(String(message.text || ""));
    }

    function shouldShowProductCard(message) {
      return /NovaBook|CloudPad|对比|选哪个|怎么选|更适合/.test(String(message.text || ""));
    }

    function summarizeSnippet(text, maxLength) {
      const normalized = String(text || "").replace(/\s+/g, " ").trim();
      if (!normalized) {
        return "命中知识证据片段";
      }
      return normalized.length > maxLength ? normalized.slice(0, maxLength) + "..." : normalized;
    }

    function formatCitationPath(citation) {
      return citation.source_path || citation.document_id || citation.namespace || "未提供";
    }

    function formatCitationChunk(citation) {
      const chunkId = citation.chunk_id || "N/A";
      const chunkIndex = typeof citation.chunk_index === "number" ? "#" + citation.chunk_index : "#N/A";
      return chunkId + " / " + chunkIndex;
    }

    function formatCitationScore(citation) {
      return typeof citation.score === "number" ? citation.score.toFixed(2) : "N/A";
    }

    function formatCitationSource(citation) {
      return citation.source_name || citation.citation_id || citation.namespace || "未命名来源";
    }

    function renderEvidenceSummary(message) {
      if (!message.citations.length) {
        return "";
      }
      const first = message.citations[0];
      return (
        '<div class="evidence-summary">' +
          '<div class="evidence-summary-top">' +
            '<div>' +
            '<strong>[' + escapeHtml(first.index || 1) + '] ' + escapeHtml(formatCitationSource(first)) + '</strong>' +
            '<span>来源路径：' + escapeHtml(formatCitationPath(first)) + '</span>' +
            '<span>Chunk：' + escapeHtml(formatCitationChunk(first)) + "</span>" +
            '</div>' +
            '<div class="evidence-score">' +
              '<strong>Score</strong>' +
              '<span>' + escapeHtml(formatCitationScore(first)) + '</span>' +
            '</div>' +
          '</div>' +
          '<span>' + escapeHtml(summarizeSnippet(first.snippet, 140)) + '</span>' +
          '<div class="evidence-counts">' +
            '<span class="evidence-pill">Top ' + escapeHtml(message.citations.length) + ' Hits</span>' +
            '<span class="evidence-pill">' + escapeHtml(first.source_kind || first.namespace || "unknown") + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="card-actions">' +
          '<span class="action-chip">插入证据回复</span>' +
          '<span class="action-chip">展开更多片段</span>' +
          '<span class="action-chip">查看命中来源</span>' +
        '</div>'
      );
    }

    function renderOrderCard(message) {
      const orderId = inferOrderId(message.text) || "O1004";
      return (
        '<section class="support-card-inline">' +
          '<div class="support-head-inline">' +
            '<h4>订单卡片</h4>' +
            '<span>自动整理</span>' +
          '</div>' +
          '<div class="support-body-inline">' +
            '<div class="detail-grid">' +
              '<div class="detail-item"><strong>订单号</strong><span>' + escapeHtml(orderId) + '</span></div>' +
              '<div class="detail-item"><strong>当前状态</strong><span>派送中</span></div>' +
              '<div class="detail-item"><strong>物流单号</strong><span>SF2049...</span></div>' +
              '<div class="detail-item full"><strong>客服建议</strong><span>先说明订单仍在履约时效内，再根据用户态度选择安抚或退款流程说明。</span></div>' +
            '</div>' +
            '<div class="card-actions">' +
              '<span class="action-chip">复制物流单号</span>' +
              '<span class="action-chip">生成安抚话术</span>' +
              '<span class="action-chip">转退款流程</span>' +
            '</div>' +
          '</div>' +
        '</section>'
      );
    }

    function renderProductCard() {
      return (
        '<section class="support-card-inline">' +
          '<div class="support-head-inline">' +
            '<h4>商品卡片</h4>' +
            '<span>对比整理</span>' +
          '</div>' +
          '<div class="support-body-inline">' +
            '<div class="detail-grid">' +
              '<div class="detail-item"><strong>NovaBook Air 14</strong><span>轻办公 / 键盘体验更好</span></div>' +
              '<div class="detail-item"><strong>CloudPad 11</strong><span>便携阅读 / 触控更灵活</span></div>' +
              '<div class="detail-item"><strong>推荐方向</strong><span>按办公强度分流</span></div>' +
              '<div class="detail-item full"><strong>客服建议</strong><span>先确认用户更看重键盘办公还是轻便携带，再给出明确推荐。</span></div>' +
            '</div>' +
            '<div class="card-actions">' +
              '<span class="action-chip">生成推荐话术</span>' +
              '<span class="action-chip">突出差异点</span>' +
              '<span class="action-chip">继续问需求</span>' +
            '</div>' +
          '</div>' +
        '</section>'
      );
    }

    function renderSupportBlocks(message) {
      if (message.role !== "assistant") {
        return "";
      }
      const promptText = message.sourcePrompt || "";
      const blocks = [];
      if (state.activeScene === "ecommerce" && shouldShowOrderCard({ text: promptText })) {
        blocks.push(renderOrderCard(message));
      }
      if (state.activeScene === "ecommerce" && shouldShowProductCard({ text: promptText })) {
        blocks.push(renderProductCard());
      }
      return blocks.join("");
    }

    function renderCitation(citation) {
      return (
        '<div class="citation-card">' +
          '<div class="citation-card-header">' +
            '<span class="citation-index">[' + escapeHtml(citation.index || 1) + ']</span>' +
            '<div class="citation-title">' +
              '<strong>' + escapeHtml(formatCitationSource(citation)) + '</strong>' +
              '<span>来源路径：' + escapeHtml(formatCitationPath(citation)) + '</span>' +
            '</div>' +
          '</div>' +
          '<div class="citation-meta-grid">' +
            '<div class="citation-meta"><strong>来源类型</strong><span>' + escapeHtml(citation.source_kind || citation.namespace || "unknown") + '</span></div>' +
            '<div class="citation-meta"><strong>Chunk</strong><span>' + escapeHtml(formatCitationChunk(citation)) + '</span></div>' +
            '<div class="citation-meta"><strong>Score</strong><span>' + escapeHtml(formatCitationScore(citation)) + '</span></div>' +
          '</div>' +
          '<div class="citation-snippet">' +
            '<strong>片段内容</strong>' +
            '<span>' + escapeHtml(citation.snippet || "命中证据片段") + '</span>' +
          '</div>' +
        '</div>'
      );
    }

    function renderWelcome() {
      return (
        '<div class="message-wrap">' +
          '<article class="message assistant">' +
            '<div class="message-avatar">AI</div>' +
            '<div class="bubble">' +
              '<div class="message-meta">' +
                '<span class="meta-chip ok">Scene Ready</span>' +
              '</div>' +
              '<p>' + escapeHtml(getSceneConfig(state.activeScene).welcome) + '</p>' +
            '</div>' +
          '</article>' +
        '</div>'
      );
    }

    function renderKnowledgeSummary(message) {
      if (message.role !== "assistant" || !message.knowledgeUsed || !message.citations.length) {
        return "";
      }
      const first = message.citations[0];
      const expanded = !!state.expandedKnowledge[message.id];
      return (
        '<div class="bubble-actions">' +
          '<button class="knowledge-toggle' + (expanded ? " is-open" : "") + '" type="button" data-knowledge-toggle="' + escapeHtml(message.id) + '">' +
            '<strong>' + (expanded ? "收起知识命中详情" : "展开知识命中详情") + '</strong>' +
            '<span>[' + escapeHtml(first.index || 1) + '] ' + escapeHtml(formatCitationSource(first)) + ' · ' + escapeHtml(summarizeSnippet(first.snippet, 56)) + '</span>' +
          '</button>' +
        '</div>'
      );
    }

    function renderMessages() {
      if (!state.messages.length) {
        refs.chatFeed.innerHTML = renderWelcome();
        scrollToBottom();
        return;
      }

      refs.chatFeed.innerHTML = state.messages.map(function (message) {
        const isUser = message.role === "user";
        const metaChips = [];
        metaChips.push('<span class="meta-chip">' + escapeHtml(isUser ? "Customer Prompt" : (message.scene || state.activeScene || "assistant")) + '</span>');
        if (!isUser && typeof message.knowledgeUsed === "boolean") {
          metaChips.push(
            '<span class="meta-chip ' + (message.knowledgeUsed ? "ok" : "warn") + '">' +
              (message.knowledgeUsed ? "Knowledge Hit" : "Need More Context") +
            '</span>'
          );
        }

        const citations = !isUser && message.citations.length && state.expandedKnowledge[message.id]
          ? (
            '<section class="support-card-inline">' +
              '<div class="support-head-inline">' +
                '<h4>证据片段</h4>' +
                '<div class="support-head-actions">' +
                  '<span>知识命中</span>' +
                  '<a class="support-link" href="./knowledge-manager.html">知识库管理</a>' +
                '</div>' +
              '</div>' +
              '<div class="support-body-inline">' +
                renderEvidenceSummary(message) +
                '<div class="citation-list">' + message.citations.map(renderCitation).join("") + '</div>' +
              '</div>' +
            '</section>'
          )
          : "";

        return (
          '<div class="message-wrap">' +
            '<article class="message ' + (isUser ? "user" : "assistant") + '">' +
              '<div class="message-avatar">' + (isUser ? "客" : "AI") + '</div>' +
              '<div class="bubble">' +
                '<div class="message-meta">' + metaChips.join("") + '</div>' +
                '<p>' + escapeHtml(message.text) + '</p>' +
                renderKnowledgeSummary(message) +
              '</div>' +
            '</article>' +
            renderSupportBlocks(message) +
            citations +
          '</div>'
        );
      }).join("");
      bindKnowledgeToggles();
      scrollToBottom();
    }

    function bindKnowledgeToggles() {
      document.querySelectorAll("[data-knowledge-toggle]").forEach(function (button) {
        button.addEventListener("click", function () {
          toggleKnowledgeDetails(button.getAttribute("data-knowledge-toggle"));
        });
      });
    }

    function toggleSourceSelection(target) {
      if (!refs.documentsMount.checked && !refs.ecommerceMount.checked) {
        target.checked = true;
      }
      updateMountTriggerLabel();
    }

    function renderSceneOptions() {
      refs.sceneSelect.innerHTML = state.scenes.map(function (scene) {
        return '<option value="' + escapeHtml(scene.scene) + '">' + escapeHtml(scene.name) + '</option>';
      }).join("");
      refs.sceneSelect.value = state.activeScene;
      renderSceneConfig();
      setInteractiveState();
    }

    function renderTyping() {
      refs.chatFeed.insertAdjacentHTML(
        "beforeend",
        '<div id="typingMessage" class="message-wrap">' +
          '<article class="message assistant">' +
            '<div class="message-avatar">AI</div>' +
            '<div class="bubble">' +
              '<div class="message-meta">' +
                '<span class="meta-chip">' + escapeHtml(state.activeScene || "assistant") + '</span>' +
                '<span class="meta-chip ok">Retrieving</span>' +
              '</div>' +
              '<div class="typing"><span></span><span></span><span></span></div>' +
            '</div>' +
          '</article>' +
        '</div>'
      );
      scrollToBottom();
    }

    function removeTyping() {
      const typing = document.getElementById("typingMessage");
      if (typing) {
        typing.remove();
      }
    }

    async function apiRequest(path, options) {
      const response = await fetch(API_BASE_URL + path, Object.assign({
        headers: { "Content-Type": "application/json" }
      }, options || {}));
      const text = await response.text();
      let data = null;
      try {
        data = text ? JSON.parse(text) : null;
      } catch (_) {
        data = text;
      }
      if (!response.ok) {
        throw new Error(data && data.detail ? JSON.stringify(data.detail) : "服务请求失败");
      }
      return data;
    }

    async function checkHealth() {
      try {
        await apiRequest("/health");
        setServiceStatus(true);
      } catch (_) {
        setServiceStatus(false);
      }
    }

    async function loadScenes() {
      state.sceneLoading = true;
      setInteractiveState();
      setComposerStatus("正在加载场景...");
      try {
        const data = await apiRequest("/scenes");
        state.scenes = Array.isArray(data.scenes) ? data.scenes : [];
        state.activeScene = pickPreferredScene(data.default_scene, state.scenes);
        renderSceneOptions();
      } catch (_) {
        state.scenes = [
          { scene: "ecommerce", name: "Ecommerce Customer Service" },
          { scene: "generic_assistant", name: "Generic Knowledge Assistant" }
        ];
        state.activeScene = "generic_assistant";
        renderSceneOptions();
      } finally {
        state.sceneLoading = false;
        setInteractiveState();
      }
    }

    async function createSessionForScene(scene, options) {
      const keepMessages = options && options.keepMessages;
      state.sceneLoading = true;
      clearError();
      if (!keepMessages) {
        state.messages = [];
        renderMessages();
      }
      setInteractiveState();
      state.activeScene = scene;
      renderSceneConfig();
      setComposerStatus("正在创建会话...");

      try {
        const mountedKnowledgeSources = getSelectedMountedKnowledgeSources();
        const data = await apiRequest("/sessions", {
          method: "POST",
          body: JSON.stringify({
            scene: scene,
            mounted_knowledge_sources: mountedKnowledgeSources
          })
        });
        state.sessionId = data.session_id || "";
        state.activeScene = data.scene || scene;
        syncMountedKnowledgeSources(data.mounted_knowledge_sources);
        refs.sceneSelect.value = state.activeScene;
        renderSceneConfig();
        renderMessages();
        updateSessionBadge();
        setServiceStatus(true);
        setComposerStatus("会话已就绪，知识源已挂载");
      } catch (error) {
        state.sessionId = "";
        updateSessionBadge();
        setServiceStatus(false);
        setComposerStatus("会话创建失败");
        showError("会话创建失败，请检查场景和知识源配置后重试。");
      } finally {
        state.sceneLoading = false;
        setInteractiveState();
      }
    }

    async function sendMessage() {
      const text = refs.input.value.trim();
      if (!text || state.sending) {
        return;
      }

      clearError();
      refs.input.value = "";
      addMessage("user", text, { scene: state.activeScene });
      renderTyping();
      state.sending = true;
      setInteractiveState();
      setComposerStatus("正在生成回复...");

      try {
        const data = await apiRequest("/chat", {
          method: "POST",
          body: JSON.stringify({
            message: text,
            session_id: state.sessionId || null,
            stream: false,
            top_k: 4
          })
        });
        state.sessionId = data.session_id || state.sessionId;
        updateSessionBadge();
        removeTyping();
        addMessage("assistant", data.answer || "当前没有生成可展示的回答。", {
          citations: data.citations,
          knowledgeUsed: data.knowledge_used,
          scene: data.scene || state.activeScene,
          sourcePrompt: text
        });
        setServiceStatus(true);
        setComposerStatus(data.knowledge_used ? "回复完成，已命中知识" : "回复完成");
      } catch (_) {
        removeTyping();
        showError("服务暂时没有返回结果，请稍后重试。");
        addMessage("assistant", "抱歉，当前服务暂时不可用。你可以稍后重试，或者切换场景后重新发起会话。", {
          knowledgeUsed: false,
          scene: state.activeScene,
          sourcePrompt: text
        });
        setServiceStatus(false);
        setComposerStatus("服务暂时不可用");
      } finally {
        state.sending = false;
        setInteractiveState();
        refs.input.focus();
      }
    }

    async function newConversation() {
      await createSessionForScene(state.activeScene);
      refs.input.focus();
    }

    async function handleSceneChange() {
      const nextScene = refs.sceneSelect.value;
      if (!nextScene || nextScene === state.activeScene) {
        return;
      }
      await createSessionForScene(nextScene);
      refs.input.focus();
    }

    function bindEvents() {
      refs.sendButton.addEventListener("click", sendMessage);
      refs.newChat.addEventListener("click", function () {
        newConversation();
      });
      refs.mountTrigger.addEventListener("click", function () {
        if (refs.mountTrigger.disabled) {
          return;
        }
        setMountMenuOpen(!refs.mountDropdown.classList.contains("open"));
      });
      refs.sceneSelect.addEventListener("change", function () {
        handleSceneChange();
      });
      refs.input.addEventListener("keydown", function (event) {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });
      refs.documentsMount.addEventListener("change", function () {
        toggleSourceSelection(refs.documentsMount);
      });
      refs.ecommerceMount.addEventListener("change", function () {
        toggleSourceSelection(refs.ecommerceMount);
      });
      document.addEventListener("click", function (event) {
        if (!refs.mountDropdown.contains(event.target)) {
          setMountMenuOpen(false);
        }
      });
      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape") {
          setMountMenuOpen(false);
        }
      });
    }

    async function init() {
      bindEvents();
      updateMountTriggerLabel();
      setMountMenuOpen(false);
      renderSceneConfig();
      renderMessages();
      setInteractiveState();
      updateSessionBadge();
      await checkHealth();
      await loadScenes();
      await createSessionForScene(state.activeScene, { keepMessages: true });
    }

    init();
  </script>
</body>
</html>
